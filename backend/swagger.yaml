components:
    schemas:
        auth.LoginUserRequest:
            properties:
                masterKeyHash:
                    type: string
                password:
                    type: string
                username:
                    type: string
            required:
                - masterKeyHash
                - password
                - username
            type: object
        auth.LoginUserResponse:
            properties:
                expiresAt:
                    type: integer
                name:
                    type: string
                token:
                    type: string
                username:
                    type: string
            type: object
        auth.RecoverRequest:
            properties:
                password:
                    type: string
                recoveryKey:
                    type: string
                username:
                    type: string
            required:
                - password
                - recoveryKey
                - username
            type: object
        auth.RecoverResponse:
            properties:
                encryptedMasterKey:
                    type: string
            type: object
        auth.RegisterUserRequest:
            properties:
                masterKeyHash:
                    type: string
                name:
                    type: string
                password:
                    type: string
                username:
                    type: string
            required:
                - masterKeyHash
                - name
                - password
                - username
            type: object
        auth.RegisterUserResponse:
            properties:
                expiresAt:
                    type: integer
                name:
                    type: string
                recoveryKey:
                    type: string
                token:
                    type: string
                username:
                    type: string
            type: object
        auth.SetupRecoveryRequest:
            properties:
                encryptedMasterKey:
                    type: string
            required:
                - encryptedMasterKey
            type: object
        hosts.CreateHostRequest:
            properties:
                hostname:
                    type: string
                iv:
                    type: string
                keyId:
                    type: integer
                label:
                    type: string
                password:
                    type: string
                port:
                    type: integer
                username:
                    type: string
            required:
                - hostname
                - iv
                - label
                - username
            type: object
        hosts.HostResponse:
            properties:
                createdAt:
                    type: string
                hostname:
                    type: string
                id:
                    type: integer
                iv:
                    type: string
                key:
                    $ref: '#/components/schemas/keys.KeyResponse'
                keyId:
                    type: integer
                label:
                    type: string
                password:
                    type: string
                port:
                    type: integer
                updatedAt:
                    type: string
                username:
                    type: string
            type: object
        hosts.UpdateHostRequest:
            properties:
                hostname:
                    type: string
                iv:
                    type: string
                keyId:
                    type: integer
                label:
                    type: string
                password:
                    type: string
                port:
                    type: integer
                username:
                    type: string
            type: object
        keys.CreateKeyRequest:
            properties:
                iv:
                    type: string
                label:
                    type: string
                passphrase:
                    type: string
                value:
                    type: string
            required:
                - iv
                - label
                - value
            type: object
        keys.KeyResponse:
            properties:
                createdAt:
                    type: string
                id:
                    type: integer
                iv:
                    type: string
                label:
                    type: string
                passphrase:
                    type: string
                updatedAt:
                    type: string
                value:
                    type: string
            type: object
        keys.UpdateKeyRequest:
            properties:
                iv:
                    type: string
                label:
                    type: string
                passphrase:
                    type: string
                value:
                    type: string
            type: object
        models.Error:
            properties:
                errors:
                    additionalProperties:
                        type: string
                    type: object
                message:
                    type: string
                statusCode:
                    type: integer
            type: object
        models.GenericResponse:
            properties:
                message:
                    type: string
            type: object
info:
    contact: {}
    description: API server for FlySsh
    title: FlySsh API
    version: "1.0"
openapi: 3.0.3
paths:
    /auth/login:
        post:
            description: Authenticate a user with username, password and masterKeyHash. The client derives authKey = PBKDF2(masterKey, email) and sends it as masterKeyHash. The server verifies it against the stored bcrypt hash.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/auth.LoginUserRequest'
                description: Login details
                required: true
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/auth.LoginUserResponse'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Internal Server Error
            summary: Login a user
            tags:
                - auth
    /auth/recover:
        post:
            description: Verify username, password, and recovery key, then return the encrypted master key blob. The client decrypts it locally. No JWT is issued — call /auth/login afterward.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/auth.RecoverRequest'
                description: Recovery credentials
                required: true
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/auth.RecoverResponse'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
            summary: Recover encrypted master key
            tags:
                - auth
    /auth/recovery/setup:
        post:
            description: After registration, the client encrypts the raw master key using the recovery key (AES-GCM, client-side) and sends the encrypted blob to the server for storage.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/auth.SetupRecoveryRequest'
                description: Encrypted master key blob
                required: true
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.GenericResponse'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Internal Server Error
            security:
                - BearerAuth: []
            summary: Store encrypted master key for recovery
            tags:
                - auth
    /auth/register:
        post:
            description: Create a new user account. The client must generate a master key locally, derive an authKey via PBKDF2(masterKey, email), and send the authKey as masterKeyHash. The server never sees the raw master key.
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/auth.RegisterUserRequest'
                description: Registration details
                required: true
                x-originalParamName: request
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/auth.RegisterUserResponse'
                    description: Created
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Bad Request
                "409":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Conflict
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Internal Server Error
            summary: Register a new user
            tags:
                - auth
    /hosts:
        get:
            description: Return all SSH hosts belonging to the authenticated user, with keys preloaded.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/hosts.HostResponse'
                                type: array
                    description: OK
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
            summary: List all hosts
            tags:
                - hosts
        post:
            description: Store an SSH host configuration. Password is a client-encrypted blob. A key can optionally be attached.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/hosts.CreateHostRequest'
                description: Host details
                required: true
                x-originalParamName: request
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/hosts.HostResponse'
                    description: Created
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Internal Server Error
            summary: Create a new host
            tags:
                - hosts
    /hosts/{id}:
        delete:
            description: Delete an SSH host by ID. Must belong to the authenticated user.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
                - description: Host ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties:
                                    type: string
                                type: object
                    description: OK
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Not Found
            summary: Delete a host
            tags:
                - hosts
        get:
            description: Return an SSH host by ID with its key preloaded. Must belong to the authenticated user.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
                - description: Host ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/hosts.HostResponse'
                    description: OK
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Not Found
            summary: Get a single host
            tags:
                - hosts
        put:
            description: Update fields of an existing SSH host. All fields are optional. If keyId is provided, the key must belong to the same user.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
                - description: Host ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/hosts.UpdateHostRequest'
                description: Fields to update
                required: true
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/hosts.HostResponse'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Not Found
            summary: Update a host
            tags:
                - hosts
    /keys:
        get:
            description: Return all SSH keys belonging to the authenticated user.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                items:
                                    $ref: '#/components/schemas/keys.KeyResponse'
                                type: array
                    description: OK
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
            summary: List all SSH keys
            tags:
                - keys
        post:
            description: Store a client-encrypted SSH key. The value and optional passphrase are opaque encrypted blobs.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/keys.CreateKeyRequest'
                description: Key details
                required: true
                x-originalParamName: request
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/keys.KeyResponse'
                    description: Created
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "500":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Internal Server Error
            summary: Create a new SSH key
            tags:
                - keys
    /keys/{id}:
        delete:
            description: Delete an SSH key by ID. Associated hosts will have their keyId set to null.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
                - description: Key ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                additionalProperties:
                                    type: string
                                type: object
                    description: OK
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Not Found
            summary: Delete an SSH key
            tags:
                - keys
        get:
            description: Return an SSH key by ID. Must belong to the authenticated user.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
                - description: Key ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/keys.KeyResponse'
                    description: OK
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Not Found
            summary: Get a single SSH key
            tags:
                - keys
        put:
            description: Update fields of an existing SSH key. All fields are optional.
            parameters:
                - description: Bearer token
                  in: header
                  name: Authorization
                  required: true
                  schema:
                    type: string
                - description: Key ID
                  in: path
                  name: id
                  required: true
                  schema:
                    type: integer
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/keys.UpdateKeyRequest'
                description: Fields to update
                required: true
                x-originalParamName: request
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/keys.KeyResponse'
                    description: OK
                "400":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Bad Request
                "401":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Unauthorized
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/models.Error'
                    description: Not Found
            summary: Update an SSH key
            tags:
                - keys
