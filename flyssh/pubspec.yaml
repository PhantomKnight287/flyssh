name: flyssh
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  dartssh2: ^2.13.0
  flutter_secure_storage: ^10.0.0
  pointycastle: ^3.9.1
  gap: ^3.0.1
  crypto: ^3.0.7
  dio: ^5.9.1
  google_fonts: ^8.0.2
  get_it: ^9.2.1
  go_router: ^17.1.0
  injectable: ^2.7.1+4
  window_manager: ^0.5.1
  toastification: ^3.0.3
  file_picker: ^10.3.10
  xterm: ^4.0.0
  flyssh_api:
    path: ./openapi
  shared_preferences: ^2.5.4
  zod_validation: ^1.0.5
  forui: ^0.20.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.11.1
  injectable_generator: ^2.12.0

flutter:
  uses-material-design: true
